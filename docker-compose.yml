services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: smk_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-smk_labas}
      POSTGRES_USER: ${DB_USERNAME:-smk_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-smk_secret}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - smk_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-smk_user} -d ${DB_DATABASE:-smk_labas}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smk_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    networks:
      - smk_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smk_backend
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: ${APP_KEY:-base64:generated_key_here}
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-smk_labas}
      DB_USERNAME: ${DB_USERNAME:-smk_user}
      DB_PASSWORD: ${DB_PASSWORD:-smk_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      AI_SERVICE_URL: http://ai-service:8001
      SANCTUM_STATEFUL_DOMAINS: localhost:3000,localhost,localhost:5173,localhost:80
    ports:
      - "8085:8000"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smk_network

  # Python AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: smk_ai_service
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      BACKEND_URL: http://backend:8000
      PYTHONUNBUFFERED: 1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8002:8001"
    volumes:
      - ./ai-service:/app
    networks:
      - smk_network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smk_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000/api
      VITE_AI_URL: http://localhost:3000/ai
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - smk_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: smk_nginx
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
      - ai-service
    networks:
      - smk_network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  smk_network:
    driver: bridge
