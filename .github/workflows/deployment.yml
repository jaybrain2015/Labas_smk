name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: jaybrain/labas-frontend:${{ github.sha }},jaybrain/labas-frontend:latest

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: jaybrain/labas-backend:${{ github.sha }},jaybrain/labas-backend:latest

      - name: Build and push ai-service
        uses: docker/build-push-action@v4
        with:
          context: ./ai-service
          push: true
          tags: jaybrain/labas-fastapi:${{ github.sha }},jaybrain/labas-fastapi:latest

      - name: Build and push nginx
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: jaybrain/labas-nginx:${{ github.sha }},jaybrain/labas-nginx:latest

      - name: Update k8s image tags
        run: |
          sed -i "s|jaybrain/labas-frontend:.*|jaybrain/labas-frontend:${{ github.sha }}|g" k8s/frontend.yaml
          sed -i "s|jaybrain/labas-backend:.*|jaybrain/labas-backend:${{ github.sha }}|g" k8s/backend.yaml
          sed -i "s|jaybrain/labas-fastapi:.*|jaybrain/labas-fastapi:${{ github.sha }}|g" k8s/fastapi.yaml
          sed -i "s|jaybrain/labas-nginx:.*|jaybrain/labas-nginx:${{ github.sha }}|g" k8s/nginx.yaml

      - name: Commit updated manifests
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ github.sha }}"
          git push