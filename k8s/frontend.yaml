apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: labas-smk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: jaybrain/labas-frontend:187c4ad00e5e15fc6b5945129a7de6a7d20dc739
          env:
            - name: VITE_API_URL
              value: "https://healthcare-appointments.com/api"
            - name: VITE_AI_URL
              value: "https://healthcare-appointments.com/ai"
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: labas-smk
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
