apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: labas-smk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: jaybrain/labas-nginx:b470816232a132fa31101335798b2f959e7ed94d
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: labas-smk
spec:
  selector:
    app: nginx
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
