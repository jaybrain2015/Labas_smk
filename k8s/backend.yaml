apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: labas-smk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: jaybrain/labas-backend:968767d355d426c6087c963a26371585ee7f44ee
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: labas-secrets
                  key: APP_KEY
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: labas-secrets
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: labas-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: labas-secrets
                  key: DB_PASSWORD
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: APP_URL
              value: "https://healthcare-appointments.com"
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: labas-smk
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
