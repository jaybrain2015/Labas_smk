apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: labas-smk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: jaybrain/labas-fastapi:968767d355d426c6087c963a26371585ee7f44ee
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: labas-secrets
                  key: ANTHROPIC_API_KEY
          ports:
            - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: labas-smk
spec:
  selector:
    app: ai-service
  ports:
    - port: 8001
      targetPort: 8001
